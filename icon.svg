<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#2563EB"/>
  <!-- upper blade -->
  <line x1="46" y1="50" x2="88" y2="12" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- lower blade -->
  <line x1="46" y1="50" x2="88" y2="88" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- upper handle connector -->
  <line x1="34" y1="37" x2="46" y2="50" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- upper handle ring -->
  <circle cx="22" cy="30" r="14" fill="none" stroke="white" stroke-width="8"/>
  <!-- lower handle connector -->
  <line x1="34" y1="63" x2="46" y2="50" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- lower handle ring -->
  <circle cx="22" cy="70" r="14" fill="none" stroke="white" stroke-width="8"/>
  <!-- pivot -->
  <circle cx="46" cy="50" r="5" fill="white"/>
</svg>
